name: drowseoff

services:
  drowseoff-api:
    build: .
    container_name: drowseoff-api
    user: "1000:1000"
    environment:
      - TZ=${TZ:-UTC}
      - DROWSEOFF_DB=${DROWSEOFF_DB:-}
      - DROWSEOFF_PORT=8010
      - DROWSEOFF_API_TOKEN=${DROWSEOFF_API_TOKEN:-}
      - DROWSEOFF_ALLOW_UNAUTHENTICATED_API=${DROWSEOFF_ALLOW_UNAUTHENTICATED_API:-}
      - DROWSEOFF_CORS_ORIGIN=${DROWSEOFF_CORS_ORIGIN:-}
      - DROWSEOFF_DEFAULT_SENSOR_DEVICE_ID=${DROWSEOFF_DEFAULT_SENSOR_DEVICE_ID:-}
      - DROWSEOFF_REMOTE_PROVIDER=${DROWSEOFF_REMOTE_PROVIDER:-}
      - DROWSEOFF_REMOTE_AUTO_ENABLED=${DROWSEOFF_REMOTE_AUTO_ENABLED:-}
      - TV_SLEEP_DB=${TV_SLEEP_DB:-}
      - TV_SLEEP_PORT=${TV_SLEEP_PORT:-}
      - TV_SLEEP_API_TOKEN=${TV_SLEEP_API_TOKEN:-}
      - TV_SLEEP_ALLOW_UNAUTHENTICATED_API=${TV_SLEEP_ALLOW_UNAUTHENTICATED_API:-}
      - TV_SLEEP_CORS_ORIGIN=${TV_SLEEP_CORS_ORIGIN:-}
      - DEFAULT_SENSOR_DEVICE_ID=${DEFAULT_SENSOR_DEVICE_ID:-}
      - REMOTE_PROVIDER=${REMOTE_PROVIDER:-}
      - REMOTE_AUTO_ENABLED=${REMOTE_AUTO_ENABLED:-}
      - BROADLINK_HOST=${BROADLINK_HOST:-}
      - BROADLINK_PACKET_PATH=${BROADLINK_PACKET_PATH:-/data/broadlink_tv_off.b64}
    ports:
      - "${DROWSEOFF_HOST_PORT:-${TV_SLEEP_HOST_PORT:-8010}}:8010"
    volumes:
      - ./data:/data
    restart: unless-stopped
