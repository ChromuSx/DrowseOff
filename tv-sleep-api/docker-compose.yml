services:
  tv-sleep-api:
    build: .
    container_name: tv-sleep-api
    user: "1000:1000"
    environment:
      - TZ=${TZ:-UTC}
      - TV_SLEEP_DB=${TV_SLEEP_DB:-/data/tv_sleep.db}
      - TV_SLEEP_PORT=8010
      - TV_SLEEP_API_TOKEN=${TV_SLEEP_API_TOKEN:-}
      - DEFAULT_SENSOR_DEVICE_ID=${DEFAULT_SENSOR_DEVICE_ID:-tv-sleep-sensor}
      - REMOTE_PROVIDER=${REMOTE_PROVIDER:-broadlink}
      - REMOTE_AUTO_ENABLED=${REMOTE_AUTO_ENABLED:-1}
      - BROADLINK_HOST=${BROADLINK_HOST:-}
      - BROADLINK_PACKET_PATH=${BROADLINK_PACKET_PATH:-/data/broadlink_tv_off.b64}
    ports:
      - "${TV_SLEEP_HOST_PORT:-8010}:8010"
    volumes:
      - ./data:/data
    restart: unless-stopped
